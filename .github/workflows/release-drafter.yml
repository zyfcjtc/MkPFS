name: Release Drafter
on:
  push:
    branches:
      - main
      - master
permissions:
  contents: write
  pull-requests: read
jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter-config.yml # the default, loads '.github/release-drafter.yml'
